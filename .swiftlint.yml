identifier_name:
  min_length: 1
  max_length: 50
  allowed_symbols: "_"

type_name:
  max_length: 50

large_tuple:
  warning: 5
  error: 6

disabled_rules:
  - todo
  - for_where
  - file_length
  - force_cast
  - force_try
  - cyclomatic_complexity
  - generic_type_name
  - function_body_length
  - type_body_length
  - function_parameter_count
  - line_length
  - function_name_whitespace
  - nesting
  - class_delegate_protocol

excluded:
  - .build
  - .git
  - .swiftpm
  - .claude
  - .vscode
  - App/OpenFlow/OpenFlow/Resources/Models
  - scripts
