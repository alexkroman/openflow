project: App/OpenFlow/OpenFlow.xcodeproj
schemes:
  - OpenFlow
# Engine has public API consumed by Tests/OpenFlowEngineTests and the
# openflow-prompt-test executable, neither of which is built by the App
# scheme. Retaining publics avoids false positives there.
retain_public: true
# DictationLog.Entry's properties exist solely to be encoded by JSONEncoder;
# Periphery can't see Codable's reflective key emission.
retain_codable_properties: true
# AppCoordinator stores a Task<Void, Never> to keep the phase-stream observer
# alive for the lifetime of the coordinator — assignment IS the use.
retain_assign_only_property_types:
  - "Task<Void, Never>"
report_exclude:
  # Sibling SPM dep (../tiny-audio-swift) — vendored model code with many
  # internal helpers. Out of scope for this repo.
  - "**/tiny-audio-swift/**"
